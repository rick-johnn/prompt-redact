# Minimal project config: pytest only. Dependencies live in requirements.in
# (Spec M1-09); the hash-pinned requirements.txt is compiled from it (see
# docs/specs/m1-09-packaging.html and the README "Development" section).
[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "integration: requires Presidio + the spaCy model (skipped if unavailable)",
]
# The ML stack (spaCy/torch) emits deprecation noise unrelated to our code.
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::UserWarning",
]
