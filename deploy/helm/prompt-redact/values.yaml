# Default values for prompt-redact.
# Override with `--set key=value` or `-f my-values.yaml`.

nameOverride: ""

# Optional registry prefix applied to both images, e.g. "ghcr.io/yourorg".
# Empty = use the image repository as-is (e.g. a locally side-loaded image).
image:
  registry: ""
  pullSecrets: []          # [{ name: my-regcred }]

# --- Python/Presidio sidecar (holds the trf model; internal-only) -----------
sidecar:
  image:
    repository: prompt-redact-sidecar
    tag: m4-01
    pullPolicy: IfNotPresent
  replicas: 1
  maxBodyBytes: 1000000          # PROMPT_REDACT_MAX_BODY_BYTES (authoritative cap)
  service:
    port: 8000
  # The trf model takes seconds to load; the startup probe budget covers it.
  startupProbe:
    periodSeconds: 5
    failureThreshold: 30         # ~150s ceiling
  resources:
    requests: { cpu: "250m", memory: "1Gi" }
    limits: { memory: "3Gi" }
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001             # matches the image's appuser
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false  # CPython writes to /tmp; see writableTmp below
    capabilities: { drop: ["ALL"] }
    seccompProfile: { type: RuntimeDefault }
  writableTmp: true              # mount an emptyDir at /tmp (paired with RO rootfs)

# --- Go front-end (the only component meant to reach the sidecar) ------------
frontend:
  image:
    repository: prompt-redact-frontend
    tag: m4-02
    pullPolicy: IfNotPresent
  replicas: 1
  maxBodyBytes: 1000000          # cheap edge cap; keep <= sidecar.maxBodyBytes
  service:
    type: ClusterIP              # set to LoadBalancer/NodePort, or front with an Ingress
    port: 8080
  resources:
    requests: { cpu: "50m", memory: "32Mi" }
    limits: { memory: "128Mi" }
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532             # distroless nonroot
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true # static binary, no writes
    capabilities: { drop: ["ALL"] }
    seccompProfile: { type: RuntimeDefault }

# --- NetworkPolicy isolation (threat T11) -----------------------------------
networkPolicy:
  enabled: true
  # Who may reach the front-end on 8080. Default: pods labelled role=client in
  # the same namespace. Point this at your ingress controller's namespace/pods
  # in production. Set enabled:false above to manage ingress yourself.
  allowedClients:
    - podSelector:
        matchLabels:
          role: client
  # Lock down egress too: front-end may only reach the sidecar (+ DNS); the
  # sidecar may only do DNS (it serves the baked-in model, never calls out).
  egress:
    enabled: true
