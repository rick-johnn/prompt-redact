apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "prompt-redact.labels" . | nindent 4 }}
    app: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        {{- include "prompt-redact.labels" . | nindent 8 }}
        app: frontend
    spec:
      {{- include "prompt-redact.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: frontend
          image: {{ include "prompt-redact.frontendImage" . }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.service.port }}
          env:
            - name: PROMPT_REDACT_LISTEN
              value: {{ printf ":%v" .Values.frontend.service.port | quote }}
            - name: PROMPT_REDACT_UPSTREAM
              value: {{ printf "http://sidecar:%v" .Values.sidecar.service.port | quote }}
            - name: PROMPT_REDACT_MAX_BODY_BYTES
              value: {{ .Values.frontend.maxBodyBytes | int | quote }}
          {{- with .Values.frontend.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "prompt-redact.labels" . | nindent 4 }}
    app: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    app: frontend
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.port }}
