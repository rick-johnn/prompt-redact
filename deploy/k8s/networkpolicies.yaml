# East-west isolation for the redact namespace. These restrict *in-cluster*
# (pod-to-pod) ingress — a stronger guarantee than the ClusterIP-only Services,
# which only keep traffic off the host. Enforcement requires a policy-aware CNI;
# k3s ships one (kube-router-based). netpol-isolation-test.sh proves enforcement
# is actually on by comparing reachability before vs after these are applied.

# 1. Baseline: deny ALL ingress to every pod in the namespace. Nothing is
#    reachable unless a later policy explicitly allows it.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: redact
spec:
  podSelector: {}        # all pods
  policyTypes: [Ingress]
---
# 2. The sidecar accepts ingress ONLY from the front-end, ONLY on 8000.
#    Any other pod (attacker, a misconfigured neighbor) is denied.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-sidecar
  namespace: redact
spec:
  podSelector:
    matchLabels: { app: sidecar }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels: { app: frontend }
      ports:
        - { protocol: TCP, port: 8000 }
---
# 3. The front-end accepts ingress only from designated clients on 8080.
#    (In production this would instead be an Ingress controller's namespace.)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-client-to-frontend
  namespace: redact
spec:
  podSelector:
    matchLabels: { app: frontend }
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels: { role: client }
      ports:
        - { protocol: TCP, port: 8080 }
