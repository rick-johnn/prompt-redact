# The Presidio/trf sidecar. ClusterIP only — never exposed outside the cluster
# (no NodePort/LoadBalancer/Ingress). The NetworkPolicy in networkpolicies.yaml
# is what additionally restricts *in-cluster* (east-west) access to it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sidecar
  namespace: redact
  labels: { app: sidecar }
spec:
  replicas: 1
  selector:
    matchLabels: { app: sidecar }
  template:
    metadata:
      labels: { app: sidecar }
    spec:
      containers:
        - name: sidecar
          image: prompt-redact-sidecar:m4-01
          imagePullPolicy: Never   # image is side-loaded via `k3d image import`
          ports:
            - containerPort: 8000
          env:
            - name: PROMPT_REDACT_MAX_BODY_BYTES
              value: "1000000"
          # /healthz flips ready only after the model warms (cold start seconds).
          startupProbe:
            httpGet: { path: /healthz, port: 8000 }
            periodSeconds: 5
            failureThreshold: 30   # allow up to ~150s for the trf model to load
          readinessProbe:
            httpGet: { path: /healthz, port: 8000 }
            periodSeconds: 10
          resources:
            requests: { cpu: "250m", memory: "1Gi" }
            limits: { memory: "3Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: sidecar
  namespace: redact
  labels: { app: sidecar }
spec:
  type: ClusterIP        # internal only
  selector: { app: sidecar }
  ports:
    - port: 8000
      targetPort: 8000
