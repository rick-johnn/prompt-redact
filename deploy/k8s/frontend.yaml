# The public Go front-end. It is the only component intended to reach the
# sidecar. In a real deployment this Service would sit behind an Ingress; here
# it stays ClusterIP and the isolation test drives it from an in-cluster client.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: redact
  labels: { app: frontend }
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: prompt-redact-frontend:m4-02
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: PROMPT_REDACT_LISTEN
              value: ":8080"
            - name: PROMPT_REDACT_UPSTREAM
              value: "http://sidecar:8000"
            - name: PROMPT_REDACT_MAX_BODY_BYTES
              value: "1000000"
          resources:
            requests: { cpu: "50m", memory: "32Mi" }
            limits: { memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: redact
  labels: { app: frontend }
spec:
  type: ClusterIP
  selector: { app: frontend }
  ports:
    - port: 8080
      targetPort: 8080
